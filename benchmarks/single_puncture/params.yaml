# ===========================================================================
# GRANITE Benchmark: single_puncture — Schwarzschild BH stability test
# Reference: Campanelli et al. 2006 (moving puncture method)
# ===========================================================================

grid:
  ncells: [128, 128, 128]
  domain_lo: [-48.0, -48.0, -48.0]
  domain_hi: [ 48.0,  48.0,  48.0] # dx = 0.75M — גס יותר, אבל מספיק לבדיקת יציבות
  ghost_cells: 4

time:
  cfl: 0.08         # max|beta|~4.22M => dt < dx/|beta|=0.25/4.22=0.059; CFL=0.08 => dt=0.02 OK
  t_final: 120.0
  max_steps: 10000000

ccz4:
  kappa1: 0.02     # standard choice (Alic+ 2012); 0.1 over-damps near puncture
  kappa2: 0.0
  eta: 2.0         # Campanelli+ 2006 standard; eta=4 over-damps Gamma-driver
  ko_sigma: 0.35   # standard for single-puncture; damps gauge wave before boundary

initial_data:
  type: brill_lindquist

black_holes:
  - mass: 1.0
    position: [0.0, 0.0, 0.0]
    momentum: [0.0, 0.0, 0.0]
    spin:     [0.0, 0.0, 0.0]

io:
  output_dir: output/single_puncture
  output_interval: 5
  checkpoint_interval: 100
