# .github/workflows/codeql.yml
name: "CodeQL Advanced Security"

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]
  schedule:
    - cron: '0 4 * * 1'   # יום שני ב-04:00 UTC (nightly)

jobs:
  analyze:
    name: Analyze (C++ + Python)
    runs-on: ubuntu-24.04
    timeout-minutes: 75          # ← הגדלתי כדי שלא יקרה cancel אחרי 45 דקות

    permissions:
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'cpp', 'python' ]

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.language == 'cpp' && 'manual' || 'none' }}

      - name: Install dependencies (C++ only)
        if: matrix.language == 'cpp'
        run: |
          sudo apt-get update && sudo apt-get install -y \
            cmake ninja-build g++-12 libopenmpi-dev libhdf5-mpi-dev libyaml-cpp-dev

      - name: Build project for CodeQL (C++ only)
        if: matrix.language == 'cpp'
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DGRANITE_ENABLE_MPI=ON \
            -DGRANITE_ENABLE_OPENMP=ON \
            -DGRANITE_ENABLE_TESTS=OFF
          cmake --build build -j4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
